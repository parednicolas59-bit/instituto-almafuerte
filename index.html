<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almafuerte — Gestión</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--bg2:#fffdf8;--bg3:#eee8d8;
  --ink:#1a1208;--ink2:#5a4e38;--ink3:#8a7e68;
  --gold:#c8922a;--gold2:#e8b24a;
  --green:#2d6a4f;--green2:#40916c;--greenlight:#d8f3dc;
  --red:#9b2226;--redlight:#fde8e8;
  --amber:#bb6800;--amberlight:#fff0cc;
  --border:#d8cfc0;--border2:#e8e0d0;
  --shadow:0 2px 12px rgba(26,18,8,0.08);
  --shadow2:0 4px 24px rgba(26,18,8,0.14);
  --font-display:'DM Serif Display',serif;
  --font:'DM Sans',sans-serif;
  --radius:10px;
}
body{background:var(--bg);font-family:var(--font);color:var(--ink);min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1208 0%,#2d2010 50%,#1a1208 100%)}
.login-card{background:var(--bg2);border-radius:16px;padding:40px 36px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:var(--font-display);font-size:28px;color:var(--ink);line-height:1.1}
.login-logo h1 span{color:var(--gold)}
.login-logo p{font-size:12px;color:var(--ink3);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.inp{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);font-family:var(--font);font-size:14px;color:var(--ink);outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;color:var(--ink2);margin-bottom:5px;display:block;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.btn-primary{width:100%;padding:12px;background:var(--ink);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:#2d2010}
.topbar{background:var(--ink);padding:0 20px;display:flex;align-items:center;gap:8px;height:52px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--font-display);font-size:18px;color:#fff;margin-right:12px;white-space:nowrap}
.logo span{color:var(--gold2)}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.nav-tab{padding:6px 12px;font-size:12px;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;border-radius:6px;white-space:nowrap;font-family:var(--font);font-weight:500;transition:all .2s}
.nav-tab.active{background:rgba(200,146,42,0.2);color:var(--gold2)}
.nav-tab:hover:not(.active){background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8)}
.topbar-right{display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(255,255,255,0.6);flex-shrink:0}
.logout-btn{padding:5px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:transparent;color:rgba(255,255,255,0.6);font-size:11px;cursor:pointer;font-family:var(--font)}
.logout-btn:hover{border-color:rgba(255,255,255,0.4);color:#fff}
.content{padding:20px;max-width:1100px;margin:0 auto}
.page-title{font-family:var(--font-display);font-size:26px;color:var(--ink);margin-bottom:4px}
.page-sub{font-size:12px;color:var(--ink3);margin-bottom:20px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.metric-label{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-value{font-size:22px;font-weight:600;color:var(--ink)}
.metric-sub{font-size:11px;color:var(--ink3);margin-top:3px}
.metric-bar{position:absolute;bottom:0;left:0;right:0;height:3px}
.m-gold .metric-bar{background:var(--gold)}.m-green .metric-bar{background:var(--green2)}.m-red .metric-bar{background:var(--red)}.m-amber .metric-bar{background:var(--amber)}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:var(--ink)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--bg3)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border2);color:var(--ink);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(200,146,42,0.04)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px}
.badge.activo{background:var(--greenlight);color:var(--green)}
.badge.inactivo,.badge.moroso{background:var(--redlight);color:var(--red)}
.badge.pagado{background:var(--greenlight);color:var(--green)}
.badge.pendiente{background:var(--amberlight);color:var(--amber)}
.badge.vencido{background:var(--redlight);color:var(--red)}
.badge.admin{background:rgba(200,146,42,0.15);color:var(--gold)}
.badge.secretaria{background:rgba(45,106,79,0.12);color:var(--green)}
.badge.docente{background:rgba(155,34,38,0.1);color:var(--red)}
.btn{padding:7px 14px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg2);color:var(--ink);font-size:12px;cursor:pointer;font-family:var(--font);font-weight:500;transition:all .2s;white-space:nowrap}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.primary:hover{background:#2d2010}
.btn.success{background:var(--greenlight);border-color:rgba(45,106,79,0.3);color:var(--green)}
.btn.success:hover{background:#b7e4c7}
.btn.danger{background:transparent;border-color:rgba(155,34,38,0.3);color:var(--red)}
.btn.danger:hover{background:var(--redlight)}
.btn.wpp{background:#25d366;border-color:#25d366;color:#fff;display:inline-flex;align-items:center;gap:5px}
.btn.wpp:hover{background:#1fba58;border-color:#1fba58}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#fff}
.btn.gold:hover{background:#b07f22}
.actions-cell{display:flex;gap:4px;flex-wrap:wrap}
.modal-bg{position:fixed;inset:0;background:rgba(26,18,8,0.6);display:flex;align-items:flex-start;justify-content:center;padding:20px;z-index:200;overflow-y:auto}
.modal{background:var(--bg2);border-radius:14px;padding:24px;width:100%;max-width:480px;box-shadow:var(--shadow2)}
.modal-title{font-family:var(--font-display);font-size:20px;margin-bottom:18px;color:var(--ink)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.empty{text-align:center;padding:40px;color:var(--ink3);font-size:13px}
.err-msg{color:var(--red);font-size:12px;margin-bottom:8px;display:none;padding:6px 10px;background:var(--redlight);border-radius:6px}
.sync-indicator{position:fixed;bottom:50px;right:16px;background:var(--ink);color:#fff;padding:6px 14px;border-radius:20px;font-size:11px;z-index:9998;display:none}
.sync-indicator.show{display:block}
@media(max-width:600px){
  .metrics{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  .content{padding:12px}
  table{font-size:11px}
  th,td{padding:7px 8px}
}
@media print{
  .topbar,.btn,.actions-cell,.nav-tabs,.topbar-right{display:none!important}
  .modal-bg{position:static;background:none;padding:0;display:block}
  .modal{box-shadow:none;border:none;background:#fff;max-width:100%;padding:0}
}
</style>
</head>
<body>
<div id="root"></div>
<div class="sync-indicator" id="sync-indicator">💾 Guardando...</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, onSnapshot, writeBatch } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDu58MvSN8h0Hklb-RpkkBf9QvF5mqii2c",
  authDomain: "instituto-almafuerte.firebaseapp.com",
  projectId: "instituto-almafuerte",
  storageBucket: "instituto-almafuerte.firebasestorage.app",
  messagingSenderId: "612619707603",
  appId: "1:612619707603:web:798ae3fd9f0ca441b32026"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const fmt=n=>'$'+Math.round(n||0).toLocaleString('es-AR');
const fd=s=>{if(!s)return'—';try{const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}catch{return'—';}};
const mesActual=()=>{const d=new Date();return d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'));};
const hoy=()=>new Date().toISOString().split('T')[0];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const nombreMes=m=>{if(!m)return'—';const p=m.split('-');return MESES[parseInt(p[1])-1]||'—';};
const añoMes=m=>{if(!m)return'';return m.split('-')[0]||'';};
const AÑOS_LABEL={1:'1° año',2:'2° año',3:'3° año'};

const LOCALIDADES={
  'Plaza':{label:'Presidencia de la Plaza',carreras:{'Técnico en Radiología':[1,2,3],'Enfermería':[1],'Auxiliar Docente':[1]}},
  'Las Breñas':{label:'Las Breñas',carreras:{'Técnico en Radiología':[1,2,3],'Enfermería':[1,2],'Instrumentación Quirúrgica':[1,2,3],'Auxiliar Docente':[2]}},
  'Charata':{label:'Charata',carreras:{'Técnico en Radiología':[1,2],'Enfermería':[1],'Marketing':[1]}}
};

const USERS_DEFAULT = [
  {id:'u1',name:'Admin',email:'admin@almafuerte',password:'admin123',role:'admin'},
  {id:'u2',name:'Secretaria',email:'sec@almafuerte',password:'1234',role:'secretaria'},
];

let data = { alumnos:[], cuotas:[], users:[] };
let currentUser = null;
let tab = 'dashboard';
let modal = null;
let busqueda = '';
let _nextAlumno = 1, _nextCuota = 1, _nextUser = 3;

function showSync(msg){
  const el=document.getElementById('sync-indicator');
  if(el){el.textContent=msg||'💾 Guardando...';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}
}

// ── FIREBASE CRUD ─────────────────────────────────────────────
async function fbSaveAlumno(a){
  await setDoc(doc(db,'alumnos',String(a.id)),a);
}
async function fbSaveCuota(c){
  await setDoc(doc(db,'cuotas',String(c.id)),c);
}
async function fbSaveUser(u){
  await setDoc(doc(db,'users',String(u.id)),u);
}
async function fbDeleteUser(id){
  await deleteDoc(doc(db,'users',String(id)));
}

async function loadAll(){
  const [aSnap,cSnap,uSnap] = await Promise.all([
    getDocs(collection(db,'alumnos')),
    getDocs(collection(db,'cuotas')),
    getDocs(collection(db,'users')),
  ]);
  data.alumnos = aSnap.docs.map(d=>d.data());
  data.cuotas = cSnap.docs.map(d=>d.data());
  data.users = uSnap.docs.map(d=>d.data());

  // Si no hay usuarios, crear los default
  if(data.users.length===0){
    for(const u of USERS_DEFAULT){ await fbSaveUser(u); }
    data.users = [...USERS_DEFAULT];
  }

  // Calcular nextIds
  if(data.alumnos.length>0) _nextAlumno = Math.max(...data.alumnos.map(a=>Number(a.id)||0))+1;
  if(data.cuotas.length>0) _nextCuota = Math.max(...data.cuotas.map(c=>Number(c.id)||0))+1;
  if(data.users.length>0) _nextUser = Math.max(...data.users.map(u=>Number(String(u.id).replace('u',''))||0))+1;

  render();

  // Escuchar cambios en tiempo real
  onSnapshot(collection(db,'alumnos'),snap=>{data.alumnos=snap.docs.map(d=>d.data());render();});
  onSnapshot(collection(db,'cuotas'),snap=>{data.cuotas=snap.docs.map(d=>d.data());render();});
  onSnapshot(collection(db,'users'),snap=>{if(snap.docs.length>0)data.users=snap.docs.map(d=>d.data());render();});
}

const getA=id=>data.alumnos.find(a=>String(a.id)===String(id));
const getCuotasA=id=>data.cuotas.filter(c=>String(c.alumnoId)===String(id));
const esMoroso=id=>data.cuotas.some(c=>String(c.alumnoId)===String(id)&&c.estado==='vencido');

function render(){
  document.getElementById('root').innerHTML=currentUser?renderApp():renderLogin();
  bindEvents();
}

function renderLogin(){
  return`<div class="login-wrap"><div class="login-card">
    <div class="login-logo"><h1>Instituto<br><span>Almafuerte</span></h1><p>Sistema de Gestión</p></div>
    <div id="conn-status" style="text-align:center;font-size:12px;color:var(--ink3);margin-bottom:12px">🔄 Conectando...</div>
    <div class="form-row"><label class="form-label">Usuario</label><input class="inp" id="l-email" placeholder="Email" autocomplete="username"></div>
    <div class="form-row"><label class="form-label">Contraseña</label><input class="inp" type="password" id="l-pass" placeholder="••••••" autocomplete="current-password"></div>
    <div id="l-err" style="color:#9b2226;font-size:12px;margin-bottom:10px;display:none">⚠️ Usuario o contraseña incorrectos</div>
    <button class="btn-primary" id="login-btn">Ingresar</button>
  </div></div>`;
}

function renderApp(){
  return`<div>
    <div class="topbar">
      <span class="logo">Instituto <span>Almafuerte</span></span>
      <div class="nav-tabs">
        <button class="nav-tab${tab==='dashboard'?' active':''}" data-tab="dashboard">Dashboard</button>
        <button class="nav-tab${tab==='alumnos'?' active':''}" data-tab="alumnos">Alumnos</button>
        <button class="nav-tab${tab==='cuotas'?' active':''}" data-tab="cuotas">Cuotas</button>
        <button class="nav-tab${tab==='cobros'?' active':''}" data-tab="cobros">Registrar Cobro</button>
        ${currentUser.role==='admin'?`<button class="nav-tab${tab==='usuarios'?' active':''}" data-tab="usuarios">Usuarios</button>`:''}
      </div>
      <div class="topbar-right">
        <span style="color:var(--gold2);font-size:10px">● En línea</span>
        <span style="color:#fff">${currentUser.name}</span>
        <span class="badge ${currentUser.role}">${currentUser.role}</span>
        <button class="logout-btn" id="logout-btn">Salir</button>
      </div>
    </div>
    <div class="content">${renderTab()}</div>
    ${modal?renderModal():''}
  </div>`;
}

function renderTab(){
  if(tab==='dashboard')return renderDash();
  if(tab==='alumnos')return renderAlumnos();
  if(tab==='cuotas')return renderCuotas();
  if(tab==='cobros')return renderCobros();
  if(tab==='usuarios')return renderUsuarios();
  return '';
}

function renderDash(){
  const mes=mesActual();
  const activos=data.alumnos.filter(a=>a.estado==='activo');
  const morosos=activos.filter(a=>esMoroso(a.id));
  const cuotasMes=data.cuotas.filter(c=>c.mes===mes);
  const cobrado=cuotasMes.filter(c=>c.estado==='pagado').reduce((s,c)=>s+Number(c.monto),0);
  const pendiente=cuotasMes.filter(c=>c.estado!=='pagado').reduce((s,c)=>s+Number(c.monto),0);
  const vencidas=data.cuotas.filter(c=>c.estado==='vencido').length;
  const pendDash=data.cuotas.filter(c=>c.mes===mes&&c.estado!=='pagado');
  return`<div>
    <div class="page-title">Dashboard</div>
    <div class="page-sub">${new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
    ${morosos.length>0?`<div style="background:var(--redlight);border:1px solid rgba(155,34,38,0.3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:12px">⚠️ <strong>${morosos.length} alumno${morosos.length>1?'s':''} con cuotas vencidas:</strong> ${morosos.map(a=>a.nombre).join(', ')}</div>`:''}
    <div class="metrics">
      <div class="metric m-gold"><div class="metric-bar"></div><div class="metric-label">Alumnos activos</div><div class="metric-value">${activos.length}</div></div>
      <div class="metric m-green"><div class="metric-bar"></div><div class="metric-label">Cobrado — ${nombreMes(mes)}</div><div class="metric-value">${fmt(cobrado)}</div></div>
      <div class="metric m-amber"><div class="metric-bar"></div><div class="metric-label">A cobrar — ${nombreMes(mes)}</div><div class="metric-value">${fmt(pendiente)}</div></div>
      <div class="metric m-red"><div class="metric-bar"></div><div class="metric-label">Cuotas vencidas</div><div class="metric-value">${vencidas}</div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Pendientes — ${nombreMes(mes)} ${añoMes(mes)}</span></div>
      <table><thead><tr><th>Alumno</th><th>Localidad</th><th>Carrera</th><th>Monto</th><th>Vencimiento</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>
        ${pendDash.length===0?`<tr><td colspan="7" class="empty">✅ Todas las cuotas del mes están cobradas</td></tr>`:''}
        ${pendDash.map(c=>{const a=getA(c.alumnoId);if(!a)return'';return`<tr>
          <td><strong>${a.nombre}</strong></td><td>${a.localidad?LOCALIDADES[a.localidad]?.label||a.localidad:'—'}</td><td>${a.carrera||'—'}${a.anio?` ${AÑOS_LABEL[a.anio]||''}`:''}</td>
          <td style="color:var(--gold);font-weight:600">${fmt(c.monto)}</td><td>${fd(c.fechaVencimiento)}</td><td><span class="badge ${c.estado}">${c.estado}</span></td>
          <td><div class="actions-cell">
            <button class="btn success" data-cobrar="${c.id}" style="font-size:11px;padding:3px 9px">Cobrar</button>
            <button class="btn wpp" data-wpp-cuota="${c.id}" style="font-size:11px;padding:3px 9px">💬</button>
          </div></td>
        </tr>`;}).join('')}
      </tbody></table>
    </div>
  </div>`;
}

function renderAlumnos(){
  const q=busqueda.toLowerCase();
  const filtrados=q?data.alumnos.filter(a=>a.nombre.toLowerCase().includes(q)||a.dni.includes(busqueda)||(a.carrera||'').toLowerCase().includes(q)||(a.localidad||'').toLowerCase().includes(q)):data.alumnos;
  return`<div>
    <div class="section-header">
      <div><div class="page-title">Alumnos</div><div class="page-sub">${data.alumnos.filter(a=>a.estado==='activo').length} activos</div></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input class="inp" id="busqueda-inp" placeholder="🔍 Buscar..." value="${busqueda}" style="width:200px">
        <button class="btn primary" id="nuevo-alumno-btn">+ Nuevo alumno</button>
      </div>
    </div>
    <div class="card"><table>
      <thead><tr><th>Alumno</th><th>DNI</th><th>Localidad</th><th>Carrera</th><th>Turno</th><th>Teléfono</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>
        ${filtrados.length===0?`<tr><td colspan="8" class="empty">No se encontraron alumnos</td></tr>`:''}
        ${filtrados.map(a=>`<tr>
          <td><strong>${a.nombre}</strong>${esMoroso(a.id)?` <span class="badge moroso" style="font-size:9px;margin-left:4px">MORA</span>`:''}</td>
          <td>${a.dni}</td><td>${a.localidad?LOCALIDADES[a.localidad]?.label||a.localidad:'—'}</td>
          <td>${a.carrera||'—'}${a.anio?` ${AÑOS_LABEL[a.anio]||''}`:''}</td><td>${a.turno||'—'}</td><td>${a.telefono}</td>
          <td><span class="badge ${a.estado}">${a.estado}</span></td>
          <td><div class="actions-cell">
            <button class="btn" data-ver-alumno="${a.id}" style="font-size:11px;padding:3px 9px">Ver</button>
            <button class="btn" data-edit-alumno="${a.id}" style="font-size:11px;padding:3px 9px">Editar</button>
            <button class="btn wpp" data-wpp-alumno="${a.id}" style="font-size:11px;padding:3px 9px">💬</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function renderCuotas(){
  const mes=mesActual();
  return`<div>
    <div class="section-header">
      <div><div class="page-title">Cuotas</div><div class="page-sub">${nombreMes(mes)} ${añoMes(mes)}</div></div>

function getMensaje(tipo,alumno){
  const cuotasPend=data.cuotas.filter(c=>String(c.alumnoId)===String(alumno.id)&&c.estado!=='pagado');
  const prox=cuotasPend[0]||null;
  const inst='Instituto Almafuerte';
  const nom=alumno.nombre.split(' ')[0];
  if(tipo==='recordatorio')return`Hola ${nom}! 👋\n\nTe recordamos que tenés una cuota de *${prox?fmt(prox.monto):'pendiente'}* con vencimiento el *${prox?fd(prox.fechaVencimiento):'próximamente'}*.\n\nPodés abonar por transferencia y enviarnos el comprobante.\n\n¡Gracias! 🙏\n— ${inst}`;
  if(tipo==='mora')return`Hola ${nom},\n\nTe informamos que tenés cuotas *vencidas* en ${inst}. Te pedimos que regularices tu situación.\n\n📞 Estamos a tu disposición.\n— ${inst}`;
  if(tipo==='confirmacion')return`Hola ${nom}! ✅\n\n*Confirmamos que recibimos tu pago correctamente.*\n\n¡Muchas gracias! 😊\n— ${inst}`;
  if(tipo==='bienvenida')return`¡Bienvenida/o ${nom}! 🎉\n\nTe damos la bienvenida al *${inst}*.\n\nCarrera: *${alumno.carrera||'—'}* — Turno ${alumno.turno}\n\n¡Cualquier consulta escribinos!\n— ${inst}`;
  return'';
}

window._onLocChange=function(){
  const loc=document.getElementById('a-localidad')?.value;
  const carEl=document.getElementById('a-carrera');
  const anioEl=document.getElementById('a-anio');
  if(!carEl||!anioEl)return;
  if(!loc||!LOCALIDADES[loc]){carEl.innerHTML='<option value="">— Seleccioná —</option>';anioEl.innerHTML='<option value="">— Año —</option>';return;}
  carEl.innerHTML='<option value="">— Seleccioná —</option>'+Object.keys(LOCALIDADES[loc].carreras).map(c=>`<option value="${c}">${c}</option>`).join('');
  anioEl.innerHTML='<option value="">— Año —</option>';
};
window._onCarChange=function(){
  const loc=document.getElementById('a-localidad')?.value;
  const car=document.getElementById('a-carrera')?.value;
  const anioEl=document.getElementById('a-anio');
  if(!anioEl)return;
  if(!loc||!car||!LOCALIDADES[loc]?.carreras[car]){anioEl.innerHTML='<option value="">— Año —</option>';return;}
  anioEl.innerHTML='<option value="">— Año —</option>'+LOCALIDADES[loc].carreras[car].map(n=>`<option value="${n}">${AÑOS_LABEL[n]}</option>`).join('');
};
window._wppChange=function(){
  const tipo=document.getElementById('wpp-tipo')?.value;
  const prev=document.getElementById('wpp-preview-texto');
  if(prev&&modal?.alumno)prev.textContent=getMensaje(tipo,modal.alumno);
};

function cbActualizarCuotas(){
  const alumnoId=document.getElementById('cb-alumno')?.value;
  const wrap=document.getElementById('cb-cuotas-wrap');
  const sel=document.getElementById('cb-cuota');
  const montoInp=document.getElementById('cb-monto');
  if(!alumnoId){if(wrap)wrap.style.display='none';if(montoInp)montoInp.value='';return;}
  const cuotas=data.cuotas.filter(c=>String(c.alumnoId)===String(alumnoId)&&c.estado!=='pagado');
  if(sel)sel.innerHTML='<option value="">— Seleccioná —</option>'+cuotas.map(c=>`<option value="${c.id}">${nombreMes(c.mes)} ${añoMes(c.mes)} — ${fmt(c.monto)}</option>`).join('');
  if(wrap)wrap.style.display='block';
  if(montoInp)montoInp.value='';
}
function cbActualizarMonto(){
  const cuotaId=document.getElementById('cb-cuota')?.value;
  const c=data.cuotas.find(x=>String(x.id)===String(cuotaId));
  const montoInp=document.getElementById('cb-monto');
  if(c&&montoInp)montoInp.value=c.monto;
}

function bindEvents(){
  const q=id=>document.getElementById(id);
  const overlay=q('modal-overlay');
  if(overlay)overlay.onclick=()=>{modal=null;render();};

  function doLogin(){
    const email=(q('l-email')?.value||'').trim();
    const pass=(q('l-pass')?.value||'').trim();
    const u=data.users.find(x=>x.email===email&&x.password===pass);
    if(u){currentUser=u;tab='dashboard';modal=null;render();}
    else{const err=q('l-err');if(err)err.style.display='block';}
  }
  if(q('login-btn'))q('login-btn').onclick=doLogin;
  if(q('l-pass'))q('l-pass').onkeydown=e=>{if(e.key==='Enter')doLogin();};
  if(q('logout-btn'))q('logout-btn').onclick=()=>{currentUser=null;modal=null;render();};

  document.querySelectorAll('.nav-tab').forEach(b=>{b.onclick=()=>{tab=b.dataset.tab;busqueda='';modal=null;render();};});
  if(q('busqueda-inp'))q('busqueda-inp').oninput=e=>{busqueda=e.target.value;render();};
  if(q('modal-cancel'))q('modal-cancel').onclick=()=>{modal=null;render();};
  if(q('nuevo-alumno-btn'))q('nuevo-alumno-btn').onclick=()=>{modal={type:'nuevo-alumno'};render();};

  if(q('modal-save-alumno'))q('modal-save-alumno').onclick=async()=>{
    const nombre=(q('a-nombre')?.value||'').trim();
    const dni=(q('a-dni')?.value||'').trim();
    const tel=(q('a-tel')?.value||'').trim();
    const email=(q('a-email')?.value||'').trim();
    const localidad=(q('a-localidad')?.value||'').trim();
    const carrera=(q('a-carrera')?.value||'').trim();
    const anio=parseInt(q('a-anio')?.value)||0;
    const turno=q('a-turno')?.value||'Mañana';
    const fecha=q('a-fecha')?.value||hoy();
    const monto=parseFloat(q('a-monto')?.value)||0;
    const estado=q('a-estado')?.value||'activo';
    const errDiv=q('a-error');
    if(!nombre||!dni||!tel){if(errDiv){errDiv.textContent='⚠️ Nombre, DNI y teléfono son obligatorios.';errDiv.style.display='block';}return;}
    showSync('💾 Guardando...');
    const editId=q('modal-save-alumno').dataset.id;
    if(editId){
      const a=data.alumnos.find(x=>String(x.id)===String(editId));
      if(a){Object.assign(a,{nombre,dni,telefono:tel,email,localidad,carrera,anio,turno,fechaAlta:fecha,montoCuota:monto,estado});await fbSaveAlumno(a);}
    } else {
      const newA={id:_nextAlumno++,nombre,dni,telefono:tel,email,localidad,carrera,anio,turno,fechaAlta:fecha,montoCuota:monto,estado:'activo'};
      data.alumnos.unshift(newA);
      await fbSaveAlumno(newA);
    }
    modal=null;render();
  };

  document.querySelectorAll('[data-ver-alumno]').forEach(b=>{b.onclick=()=>{const a=getA(b.dataset.verAlumno);if(a){modal={type:'ver-alumno',alumno:a};render();}};});
  document.querySelectorAll('[data-edit-alumno]').forEach(b=>{b.onclick=()=>{const a=getA(b.dataset.editAlumno);if(a){modal={type:'edit-alumno',alumno:a};render();}};});

  document.querySelectorAll('[data-cobrar]').forEach(b=>{b.onclick=async()=>{
    const c=data.cuotas.find(x=>String(x.id)===String(b.dataset.cobrar));
    if(!c)return;
    c.estado='pagado';c.fechaPago=hoy();c.medioPago='efectivo';
    showSync('💾 Guardando...');
    await fbSaveCuota(c);
    modal={type:'comp-cuota',cuota:c};render();
  };});

  document.querySelectorAll('[data-ver-recibo]').forEach(b=>{b.onclick=()=>{const c=data.cuotas.find(x=>String(x.id)===String(b.dataset.verRecibo));if(c){modal={type:'comp-cuota',cuota:c};render();}};});
  document.querySelectorAll('[data-wpp-cuota]').forEach(b=>{b.onclick=()=>{const c=data.cuotas.find(x=>String(x.id)===String(b.dataset.wppCuota));const a=c?getA(c.alumnoId):null;if(a){modal={type:'wpp-mensaje',alumno:a};render();}};});
  document.querySelectorAll('[data-wpp-alumno]').forEach(b=>{b.onclick=()=>{const a=getA(b.dataset.wppAlumno);if(a){modal={type:'wpp-mensaje',alumno:a};render();}};});
  if(q('abrir-wpp-btn'))q('abrir-wpp-btn').onclick=()=>{
    const tipo=q('wpp-tipo')?.value||'recordatorio';
    const a=getA(q('abrir-wpp-btn').dataset.alumnoId);
    if(!a)return;
    const texto=getMensaje(tipo,a);
    const tel=a.telefono.replace(/\D/g,'');
    window.open(`https://wa.me/549${tel}?text=${encodeURIComponent(texto)}`,'_blank');
  };

  if(q('cb-alumno'))q('cb-alumno').onchange=cbActualizarCuotas;
  if(q('cb-cuota'))q('cb-cuota').onchange=cbActualizarMonto;
  if(q('confirmar-cobro-btn'))q('confirmar-cobro-btn').onclick=async()=>{
    const alumnoId=q('cb-alumno')?.value;
    const cuotaId=q('cb-cuota')?.value;
    const monto=parseFloat(q('cb-monto')?.value)||0;
    const fecha=q('cb-fecha')?.value||hoy();
    const medio=q('cb-medio')?.value||'transferencia';
    const errDiv=q('cb-error');
    if(!alumnoId){if(errDiv){errDiv.textContent='⚠️ Seleccioná un alumno.';errDiv.style.display='block';}return;}
    if(!cuotaId){if(errDiv){errDiv.textContent='⚠️ Seleccioná una cuota.';errDiv.style.display='block';}return;}
    if(!monto){if(errDiv){errDiv.textContent='⚠️ Ingresá un monto.';errDiv.style.display='block';}return;}
    if(errDiv)errDiv.style.display='none';
    const c=data.cuotas.find(x=>String(x.id)===String(cuotaId));
    if(!c)return;
    c.estado='pagado';c.fechaPago=fecha;c.monto=monto;c.medioPago=medio;
    showSync('💾 Guardando...');
    await fbSaveCuota(c);
    modal={type:'comp-cuota',cuota:c};render();
  };

  if(q('generar-cuotas-btn'))q('generar-cuotas-btn').onclick=()=>{modal={type:'generar-cuotas'};render();};
  if(q('confirmar-generar-cuotas'))q('confirmar-generar-cuotas').onclick=async()=>{
    const mes=mesActual();
    const venc=q('g-vencimiento')?.value||mes+'-10';
    const sinCuota=data.alumnos.filter(a=>a.estado==='activo'&&!data.cuotas.find(c=>String(c.alumnoId)===String(a.id)&&c.mes===mes));
    showSync('💾 Generando cuotas...');
    for(const a of sinCuota){
      const monto=parseFloat(document.getElementById(`gc-monto-${a.id}`)?.value)||a.montoCuota||25000;
      const newC={id:_nextCuota++,alumnoId:a.id,mes,monto,estado:'pendiente',fechaPago:null,fechaVencimiento:venc,medioPago:null};
      data.cuotas.push(newC);
      await fbSaveCuota(newC);
    }
    modal=null;tab='cuotas';render();
  };

  if(q('nuevo-user-btn'))q('nuevo-user-btn').onclick=()=>{modal={type:'nuevo-user'};render();};
  if(q('modal-save-user'))q('modal-save-user').onclick=async()=>{
    const nombre=(q('u-nombre')?.value||'').trim();
    const email=(q('u-email')?.value||'').trim();
    const pass=(q('u-pass')?.value||'').trim();
    const role=q('u-role')?.value||'secretaria';
    const errDiv=q('u-error');
    const editId=q('modal-save-user').dataset.id;
    if(!nombre||!email){if(errDiv){errDiv.textContent='⚠️ Nombre y email son obligatorios.';errDiv.style.display='block';}return;}
    if(editId){
      const u=data.users.find(x=>String(x.id)===String(editId));
      if(u){u.name=nombre;u.email=email;u.role=role;showSync('💾 Guardando...');await fbSaveUser(u);}
    } else {
      if(!pass){if(errDiv){errDiv.textContent='⚠️ Ingresá una contraseña.';errDiv.style.display='block';}return;}
      const newU={id:'u'+_nextUser++,name:nombre,email,password:pass,role};
      data.users.push(newU);
      showSync('💾 Guardando...');
      await fbSaveUser(newU);
    }
    modal=null;render();
  };
  document.querySelectorAll('[data-edit-user]').forEach(b=>{b.onclick=()=>{const u=data.users.find(x=>String(x.id)===String(b.dataset.editUser));if(u){modal={type:'edit-user',user:u};render();}};});
  document.querySelectorAll('[data-del-user]').forEach(b=>{b.onclick=async()=>{if(!confirm('¿Eliminar?'))return;await fbDeleteUser(b.dataset.delUser);data.users=data.users.filter(u=>String(u.id)!==String(b.dataset.delUser));render();};});
}

// Arrancar
document.getElementById('root').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1208,#2d2010);color:#fff;font-family:sans-serif;font-size:14px;flex-direction:column;gap:12px"><div style="font-size:32px">🎓</div><div>Conectando con la nube...</div></div>';
loadAll().then(()=>{
  const el=document.getElementById('conn-status');
  if(el)el.textContent='🟢 Conectado';
}).catch(err=>{
  console.error(err);
  document.getElementById('root').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#9b2226;font-family:sans-serif;font-size:14px">❌ Error de conexión. Recargá la página.</div>';
});
</script>
